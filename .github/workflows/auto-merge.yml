name: Auto-merge Dependabot PRs

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI checks
        run: |
          echo "Waiting for CI checks to complete..."
          for i in $(seq 1 60); do
            RESULT=$(gh pr checks "$PR_URL" --json name,status,conclusion --jq '[.[] | select(.name != "auto-merge")] | if length == 0 then "pending" elif all(.status == "COMPLETED") then (if all(.conclusion == "SUCCESS") then "pass" else "fail" end) else "pending" end')
            echo "Attempt $i: $RESULT"
            if [ "$RESULT" = "pass" ]; then
              echo "All checks passed!"
              exit 0
            elif [ "$RESULT" = "fail" ]; then
              echo "Some checks failed, skipping merge"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for checks"
          exit 1
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and merge
        run: |
          gh pr review "$PR_URL" --approve
          gh pr merge "$PR_URL" --squash --delete-branch
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
