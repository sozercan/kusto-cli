name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1 -cover
      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -o kusto-cli ./cmd/kusto-cli
      - name: Offline direct command smoke
        run: ./kusto-cli --auth none --service-uri https://help.kusto.windows.net --database Samples tools >/tmp/tools.json

  public-endpoint-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Verify public Kusto help endpoint returns an auth challenge
        run: |
          set -euo pipefail
          status=$(curl --silent --show-error --output /tmp/kusto-response.txt --write-out '%{http_code}' \
            --max-time 30 \
            -X POST https://help.kusto.windows.net/v2/rest/query \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            -d '{"db":"Samples","csl":"print ok=1"}')
          test "$status" = "401"
